name: Data Pipeline (Gold + News + RAG)

on:
  schedule:
    # chạy 3 lần/ngày (VN)
    - cron: '7 2,6,10 * * *'  # 09:07, 13:07, 17:07
  workflow_dispatch: {}

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - name: ⏱ Log start time
        working-directory: .
        run: echo "START $(date)"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ========================
      # 1. CRAWL PRICE
      # ========================
      - name: Crawl Gold Price + Market
        run: |
          echo "=== CRAWL PRICE ==="
          python -c "
          from jobs.worker.main import job_update_gold_price, job_update_market_data
          job_update_gold_price()
          job_update_market_data()
          "

      # ========================
      # 2. CRAWL NEWS
      # ========================
      - name: Crawl News
        run: |
          echo "=== CRAWL NEWS ==="
          python -c "
          from jobs.worker.main import (
              job_update_gold_news,
              job_update_kitco_news,
              job_update_cafef_news,
              job_update_reuters_news,
          )
          job_update_gold_news()
          job_update_kitco_news()
          job_update_cafef_news()
          job_update_reuters_news()
          "

      # ========================
      # 3. PREPROCESS
      # ========================
      - name: Preprocess News
        run: |
          echo "=== PREPROCESS ==="
          python -c "
          from jobs.worker.main import job_preprocess_news
          job_preprocess_news()
          "

      # ========================
      # 4. INDEX RAG
      # ========================
      - name: Index to Qdrant
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
        run: |
          echo "=== INDEX ==="
          python -c "
          from jobs.worker.main import job_index_news
          job_index_news()
          "

      - name: ✅ Done
        working-directory: .
        run: echo "FINISHED $(date)"