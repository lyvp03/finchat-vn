services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finchat-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 1
    env_file:
      - backend/.env.prod
    ports:
      - "8000:8000"
    depends_on:
      - clickhouse
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finchat-worker
    command: python -m jobs.worker.main
    env_file:
      - backend/.env.prod
    depends_on:
      - clickhouse
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: finchat-clickhouse
    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: gold
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-phglyxg}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

volumes:
  clickhouse_data:
